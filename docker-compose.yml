services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --user root --pass ${SURREAL_PASS:-root} rocksdb:/data/srdb
    ports:
      - "8000:8000"
    volumes:
      - surreal_data:/data/srdb
    environment:
      # NOTE: PLAN.md 1-2ではデフォルトで権限を全許可。運用環境では必要に応じて false を指定すること。
      - SURREAL_CAPS_ALLOW_ALL=${SURREAL_CAPS_ALLOW_ALL:-true}

volumes:
  surreal_data:
